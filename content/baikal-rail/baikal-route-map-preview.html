<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>西伯利亞足跡圖</title>
<style>
  body {
    margin: 0;
    padding: 28px 18px 48px;
    font-family: "PingFang TC", "Noto Sans TC", sans-serif;
    color: #1B4332;
    background: #1B4332;
  }
  h1 { margin: 0 0 6px; font-size: 1.15rem; color: #F5F0E8; }
  p { margin: 0 0 18px; color: #F5F0E8; opacity: 0.65; line-height: 1.5; font-size: 0.92rem; }
  .frame {
    max-width: 700px;
    margin: 0 auto;
    padding: 18px;
    background: rgba(245, 240, 232, 0.96);
    border-radius: 12px;
  }
  .frame object, .frame img, .frame svg { display: block; width: 100%; height: auto; }
</style>
</head>
<body>
  <div style="max-width:700px;margin:0 auto 12px">
    <h1>西伯利亞足跡總覽</h1>

  </div>
  <div class="frame">
    <object type="image/svg+xml" data="baikal-route-map.svg" aria-label="西伯利亞大鐵路足跡總覽">
      <!-- fallback -->
      <img src="baikal-route-map.svg" alt="西伯利亞大鐵路足跡總覽">
    </object>
  </div>

</html>
