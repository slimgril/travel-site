<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}}</title>
<meta name="description" content="{{DESC}}">
<meta property="og:title" content="{{TITLE}}">
<meta property="og:description" content="{{DESC}}">
<meta property="og:type" content="website">
<link rel="stylesheet" href="/base.css?v=20260710-mobile">
<style>
  /* 首页专用：编号系列卡片 */
  .series-grid {
    display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
    gap:24px; margin-top:40px;
  }
  .series-card {
    display:block; text-decoration:none; border-radius:16px; padding:28px 26px;
    background:var(--card-bg); box-shadow:var(--shadow);
    border:1px solid rgba(27,67,50,0.1); transition:transform 0.2s, box-shadow 0.2s;
    position:relative; overflow:hidden;
  }
  .series-card:hover { transform:translateY(-6px); box-shadow:0 12px 32px rgba(0,0,0,0.16); }
  .series-card::before {
    content:''; position:absolute; top:0; left:0; width:100%; height:5px;
    background:linear-gradient(90deg,var(--green-mid),var(--gold));
  }
  .series-future::before { background:linear-gradient(90deg,#999,#ccc); }
  .series-num {
    font-size:0.8rem; letter-spacing:3px; color:var(--gold);
    font-weight:700; margin-bottom:10px;
  }
  .series-title { font-size:1.4rem; font-weight:700; color:var(--green-dark); margin-bottom:6px; }
  .series-sub { font-size:0.85rem; color:var(--text-light); margin-bottom:14px; }
  .series-summary { font-size:0.9rem; color:#444; line-height:1.7; margin-bottom:18px; min-height:3em; }
  .series-mark {
    display:inline-block; font-size:0.78rem; font-weight:700; letter-spacing:1px;
    padding:5px 14px; border-radius:20px;
    background:rgba(45,106,79,0.12); color:var(--green-mid);
  }
  .series-future .series-mark { background:rgba(120,120,120,0.12); color:#888; }
  .series-future .series-title { color:#888; }
</style>
</head>
<body>
{{BODY}}
</body>
</html>
