<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}}</title>
<meta name="description" content="{{DESC}}">
<meta property="og:title" content="{{TITLE}}">
<meta property="og:description" content="{{DESC}}">
<meta property="og:type" content="website">
<link rel="stylesheet" href="/base.css?v=20260710-mobile">
</head>
<body>
{{BODY}}
<div id="lightbox">
  <span class="lightbox-close">&times;</span>
  <img src="" alt="">
  <div class="lightbox-caption"></div>
</div>
<script>
(function () {
  var lb = document.getElementById('lightbox');
  var lbImg = lb.querySelector('img');
  var lbCaption = lb.querySelector('.lightbox-caption');

  function extractUrl(el) {
    if (el.tagName === 'IMG') return el.src;
    var bg = el.style.backgroundImage || getComputedStyle(el).backgroundImage;
    var m = bg && bg.match(/url\((['"]?)(.*?)\1\)/);
    return m ? m[2] : null;
  }

  function caption(el) {
    var label = el.querySelector && el.querySelector('.img-label');
    if (label) return label.textContent;
    return el.getAttribute('alt') || '';
  }

  document.addEventListener('click', function (e) {
    var el = e.target.closest('.site-img.photo, .live-img');
    if (!el) return;
    var src = extractUrl(el);
    if (!src) return;
    lbImg.src = src;
    lbCaption.textContent = caption(el);
    lb.classList.add('open');
  });

  lb.addEventListener('click', function () {
    lb.classList.remove('open');
    lbImg.src = '';
  });

  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') {
      lb.classList.remove('open');
      lbImg.src = '';
    }
  });
})();
</script>
</body>
</html>
